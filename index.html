<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Time Dashboard</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

<!-- profile -->
<aside class="profile">

<div class="top">

<img
src="https://i.pravatar.cc/120"
alt="profile">

<p>
Report for
</p>

<h1>
Kobe<br>
Braynt
</h1>

</div>

<div class="filters">

<button
data-view="daily">
Daily
</button>

<button
data-view="weekly"
class="active">
Weekly
</button>

<button
data-view="monthly">
Monthly
</button>

</div>

</aside>


<!-- dashboard -->

<main class="dashboard">

<div class="card">

<h3>
Work
</h3>

<p id="work">
0hrs
</p>

</div>


<div class="card">

<h3>
Play
</h3>

<p id="play">
0hrs
</p>

</div>


<div class="card">

<h3>
Study
</h3>

<p id="study">
0hrs
</p>

</div>


<div class="card">

<h3>
Exercise
</h3>

<p id="exercise">
0hrs
</p>

</div>


<div class="card">

<h3>
Social
</h3>

<p id="social">
0hrs
</p>

</div>


<div class="card">

<h3>
Self Care
</h3>

<p id="self-care">
0hrs
</p>

</div>

</main>

</div>

<script src="script.js">
</script>

</body>

</html>
